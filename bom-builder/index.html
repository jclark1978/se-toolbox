<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SE Toolbox - BOM Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../src/shared/ui/toolbox-shell.css" />
  <link rel="stylesheet" href="../src/features/bom-builder/page.css" />
  <script src="../src/shared/ui/theme-init.js"></script>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-row">
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch color mode" aria-pressed="false">
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-icon theme-icon-sun">☀</span>
            <span class="theme-icon theme-icon-moon">☾</span>
            <span class="theme-toggle-knob"></span>
          </span>
        </button>
      </div>
      <nav id="toolbox-nav" class="top-nav" aria-label="Primary navigation"></nav>
    </header>

    <main>
      <section class="panel bom-builder-host-panel">
        <iframe
          id="bom-builder-frame"
          class="bom-builder-frame"
          src="../vendor/FortiBOM/index.html"
          title="Embedded FabricBOM workspace"
          loading="eager"
        ></iframe>
      </section>
    </main>

    <footer>
      Build product configurations and manage your Project BOM from one place inside SE Toolbox.
    </footer>
  </div>

  <script type="module" src="../src/features/bom-builder/main.js"></script>
</body>
</html>
